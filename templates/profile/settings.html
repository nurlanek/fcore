{% extends "base.html" %}
{% load i18n %}
{% load static %}
{% block content %}

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">

      <div class="card shadow-sm p-4">

        <h4 class="mb-3 text-center">{% trans "Profile Settings" %}</h4>

        <form id="profileForm">

          <label>{% trans "Language" %}</label>
          <select class="form-select mb-3" id="language">
            <option value="en">English</option>
            <option value="ru">Русский</option>
            <option value="tr">Türkçe</option>
            <option value="ky">Кыргызча</option>
            <option value="kk">Қазақша</option>
            <option value="uz">O'zbekcha</option>
          </select>

          <label>Timezone</label>
          <select class="form-select mb-3" id="timezone">
            <option value="UTC">UTC</option>
            <option value="Asia/Bishkek">Asia/Bishkek</option>
            <option value="Europe/Moscow">Europe/Moscow</option>
            <option value="Europe/Istanbul">Europe/Istanbul</option>
          </select>

          <label>{% trans "Preferred currency" %}</label>
          <select class="form-select mb-4" id="currency"></select>

          <button class="btn btn-primary w-100">{% trans "Save" %}</button>

        </form>

        <div id="msg" class="mt-2 text-center"></div>

      </div>

    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    // 1. Биринчи валюталарды, анан профилди жүктөйбүз
    loadCurrenciesGlobal("currency").then(loadProfile);
});

// Профилди жүктөө функциясы
async function loadProfile(){
  // apiFetch автоматтык түрдө window.API_BASE жана токенди кошот
  const data = await apiFetch("/api/v1/profile/");
  if (data) {
      document.getElementById("language").value = data.language;
      document.getElementById("timezone").value = data.timezone;
      document.getElementById("currency").value = data.preferred_currency;
  }
}

// Форманы сактоо логикасы
document.getElementById("profileForm").onsubmit = async function(e) {
  e.preventDefault();

  const selectedLang = document.getElementById("language").value;
  const payload = {
    language: selectedLang,
    timezone: document.getElementById("timezone").value,
    preferred_currency: document.getElementById("currency").value
  };

  // PUT методу менен серверге жиберебиз
  const res = await fetch(window.API_BASE + "/api/v1/profile/", {
    method: "PUT",
    headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + localStorage.getItem("access")
    },
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  if(res.ok){
    // Тилди куукиге сактоо (интерфейс дароо өзгөрүшү үчүн)
    document.cookie = "django_language=" + selectedLang + "; path=/";
    document.getElementById("msg").innerHTML = "<span class='text-success'>Saved ✔</span>";

    // Жаңы тилди активдештирүү үчүн баракчаны жаңылайбыз
    setTimeout(() => {
        location.reload();
    }, 500);
  } else {
    document.getElementById("msg").innerHTML = "<span class='text-danger'>Error: " + JSON.stringify(data) + "</span>";
  }
};
</script>

{% endblock %}
