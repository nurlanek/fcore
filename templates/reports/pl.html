{% extends "base.html" %}{% load i18n %}
{% block content %}
<h4>{% trans "Profit & Loss" %}</h4>
<div class="card p-3">
    <p>{% trans "Total Income" %}: <b id="income">0</b></p>
    <p>{% trans "Total Expense" %}: <b id="expense">0</b></p>
    <hr>
    <h5>{% trans "Net Profit" %}: <b id="net">0</b></h5>
</div>
<script>
async function loadPL() {
    let res = await fetch(window.API_BASE + "/api/v1/reports/profit-loss/", {
        headers: { "Authorization": "Bearer " + localStorage.getItem("access"), "X-Company-ID": localStorage.getItem("company_id") }
    });
    let data = await res.json();
    document.getElementById("income").innerText = data.total_income;
    document.getElementById("expense").innerText = data.total_expense;
    document.getElementById("net").innerText = data.net_profit;
}
loadPL();
</script>
{% endblock %}
