{% load i18n %}
{% load static %}
<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/html">
<head>
  <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FCore Accounting</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="{% static 'js/core.js' %}"></script>
</head>
<body>
<div class="row justify-content-center align-items-center vh-100">
<div class="col-md-4">

<h4>Login</h4>

<form id="loginForm">
  <input class="form-control mb-2" type="email" id="email" placeholder="Email">
  <input class="form-control mb-2" type="password" id="password" placeholder="Password">
  <button class="btn btn-primary w-100">Login</button>
</form>
<div class="text-center mt-4">
  <small class="text-muted">
    Don’t have an account?
  </small>
  <br>
  <a href="/register/" class="btn btn-outline-primary btn-sm mt-2">
    Create Account
  </a>
</div>

<div id="error" class="text-danger mt-2"></div>

<script>
document.getElementById("loginForm").onsubmit = async function(e){
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const errorBox = document.getElementById("error");

    errorBox.innerText = "";

    let res = await fetch(window.API_BASE + "/api/v1/auth/login/", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, password })
    });

    let data = await res.json();

    if(!res.ok){
        errorBox.innerText = data.detail || "Login failed";
        return;
    }

    // токендер
    localStorage.setItem("access", data.access);
    localStorage.setItem("refresh", data.refresh);

    // компанияларды текшерүү
    const companiesRes = await fetch(window.API_BASE + "/api/v1/companies/", {
    headers: {
        "Authorization": "Bearer " + data.access
    }
    });


    const companies = await companiesRes.json();

    if(companies.length === 0){
        window.location.href = "/company/create/";
    }else{
        localStorage.setItem("company_id", companies[0].company_id);
        window.location.href = "/dashboard/";
    }
}
</script>

</div>
</div>
</body>
</html>
