{% load i18n %}
{% load static %}
<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/html">
<head>
  <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FCore Accounting</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="{% static 'js/core.js' %}"></script>
</head>
<body>

<div class="row justify-content-center">
<div class="col-md-4">

<h4>Register</h4>

<form id="registerForm">
  <input class="form-control mb-2" type="email" id="email" placeholder="Email" required>
  <input class="form-control mb-2" type="password" id="password" placeholder="Password" required>
  <button class="btn btn-success w-100">Create account</button>
</form>

<div id="msg" class="mt-2"></div>

<script>
document.getElementById("registerForm").onsubmit = async function(e){
    e.preventDefault();

    let res = await fetch(window.API_BASE + "/api/v1/auth/register/", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
        email: email.value,
        password: password.value
    })
    });

    let data = await res.json();

    if(res.ok){
        msg.innerHTML = "<span class='text-success'>Account created. Redirecting...</span>";
        setTimeout(()=> location.href="/", 1200);
    }else{
        msg.innerHTML = "<span class='text-danger'>"+JSON.stringify(data)+"</span>";
    }
}
</script>

</div>
</div>

</body>
</html>
