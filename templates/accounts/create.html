{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="container">
    <div class="col-md-5">
        <h4>{% trans "Add Account" %}</h4>
        <form id="accountForm">
            <!-- Эсептин аты -->
            <input class="form-control mb-2" id="name" placeholder="{% trans 'Account name' %}" required>

            <!-- Негизги түрү (Asset, Liability, ж.б.) -->
            <label class="small text-muted">{% trans "Account Type" %}</label>
            <select class="form-select mb-2" id="type">
                <option value="asset">Asset</option>
                <option value="liability">Liability</option>
                <option value="equity">Equity</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>

            <!-- ЖАҢЫ: Субтип (Тилге байланбоо үчүн эң маанилүүсү) -->
            <label class="small text-muted">{% trans "Account Subtype (Optional)" %}</label>
            <select class="form-select mb-2" id="subtype">
                <option value="">-- {% trans "None" %} --</option>
                <option value="cash">Cash</option>
                <option value="bank">Bank</option>
                <option value="tax">Tax</option> <!-- Салыктар үчүн ушуну тандашат -->
                <option value="other">Other</option>
            </select>

            <!-- Валюта -->
            <label class="small text-muted">{% trans "Currency" %}</label>
            <select class="form-select mb-2" id="currency"></select>

            <!-- Код -->
            <input class="form-control mb-3" id="code" placeholder="{% trans 'Code (e.g., 2000)' %}">

            <button class="btn btn-primary w-100" type="submit">{% trans "Save" %}</button>
        </form>
        <div id="msg" class="mt-2 text-center"></div>
    </div>
</div>

<script>
document.getElementById("accountForm").addEventListener("submit", async function(e){
    e.preventDefault();

    // Маалыматтарды чогултуу
    const payload = {
        name: document.getElementById("name").value,
        type: document.getElementById("type").value,
        subtype: document.getElementById("subtype").value || null, // Жаңы кошулду
        currency: document.getElementById("currency").value,
        code: document.getElementById("code").value
    };

    const res = await apiFetch("/api/v1/accounts/create/", {
        method: "POST",
        body: JSON.stringify(payload)
    });

    const msg = document.getElementById("msg");
    if(res && res.id){
        msg.innerHTML = "<span class='text-success'>{% trans 'Account created ✅' %}</span>";
        document.getElementById("accountForm").reset();
    } else {
        msg.innerHTML = "<span class='text-danger'>{% trans 'Error saving account' %}</span>";
    }
});

document.addEventListener("DOMContentLoaded", () => {
    loadCurrenciesGlobal("currency");
});
</script>
{% endblock %}
