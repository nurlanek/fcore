{% extends "base.html" %}
{% load i18n %}
{% block content %}

<div class="container">
  <div class="col-md-5">

    <h4>{% trans "Add Account" %}</h4>

    <form id="accountForm">

      <input class="form-control mb-2" id="name" placeholder="{% trans 'Account name' %}"  required>

      <select class="form-select mb-2" id="type">
        <option value="asset">{% trans "Asset" %}</option>
        <option value="liability">{% trans "Liability" %}</option>
        <option value="equity">{% trans "Equity" %}</option>
        <option value="income">{% trans "Income" %}</option>
        <option value="expense">{% trans "Expense" %}</option>
      </select>

      <select class="form-select mb-2" id="currency"></select>

      <input class="form-control mb-2" id="code" placeholder="{% trans 'Code (1000)' %}">

      <button class="btn btn-primary" type="submit">{% trans "Save" %}</button>

    </form>

    <div id="msg" class="mt-2"></div>

  </div>
</div>

<script>


// ---------- Submit form ----------
document.getElementById("accountForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const payload = {
        name: document.getElementById("name").value,
        type: document.getElementById("type").value,
        currency: document.getElementById("currency").value,
        code: document.getElementById("code").value
    };

    const res = await fetch(window.API_BASE + "/api/v1/accounts/create/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + localStorage.getItem("access"),
            "X-Company-ID": localStorage.getItem("company_id")
        },
        body: JSON.stringify(payload)
    });

    const data = await res.json();

    console.log("Sent payload:", payload);   // 👈 текшерүү үчүн
    console.log("Response:", data);

    const msg = document.getElementById("msg");

    if(res.ok){
        msg.innerHTML = "<span class='text-success'>Account created ✅</span>";
        document.getElementById("accountForm").reset();
    } else {
        msg.innerHTML = "<span class='text-danger'>" + JSON.stringify(data) + "</span>";
    }
});

// ---------- Init ----------
document.addEventListener("DOMContentLoaded", loadCurrencies);
</script>

{% endblock %}
