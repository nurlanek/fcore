{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="card shadow-sm p-4">
    <div class="d-flex justify-content-between mb-3">
        <h4>{% trans "Partner Types" %}</h4>
        <button class="btn btn-primary" onclick="showTypeModal()">+ {% trans "Add Type" %}</button>
    </div>

    <table class="table table-hover">
        <thead>
            <tr>
                <th>{% trans "Code" %}</th>
                <th>{% trans "Name" %}</th>
                <th>{% trans "Actions" %}</th>
            </tr>
        </thead>
        <tbody id="typeTable"></tbody>
    </table>
</div>

<!-- Modal -->
<div class="modal fade" id="typeModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content p-3">
            <h5 id="typeModalTitle">{% trans "Partner Type" %}</h5>
            <input type="hidden" id="type_id">
            <input type="text" id="t_code" class="form-control mb-2" placeholder="Code (мис: vip)">
            <input type="text" id="t_name" class="form-control mb-3" placeholder="Name" required>
            <button class="btn btn-success w-100" onclick="savePartnerType()">{% trans "Save" %}</button>
        </div>
    </div>
</div>

<script>
async function loadTypes() {
    const data = await apiFetch("/api/v1/partner-types/"); // [2]
    const tbody = document.getElementById("typeTable");
    tbody.innerHTML = data.map(t => `
        <tr>
            <td><code>${t.code}</code></td>
            <td>${t.name}</td>
            <td>
                <button class="btn btn-sm btn-warning" onclick='editType(${JSON.stringify(t)})'>✎</button>
                <button class="btn btn-sm btn-danger" onclick="deleteType(${t.id})">🗑</button>
            </td>
        </tr>
    `).join('');
}

async function savePartnerType() {
    const id = document.getElementById("type_id").value;
    const payload = {
        code: document.getElementById("t_code").value,
        name: document.getElementById("t_name").value
    };
    const url = id ? `/api/v1/partner-types/${id}/` : "/api/v1/partner-types/";
    const method = id ? "PUT" : "POST";

    const res = await fetch(window.API_BASE + url, {
        method: method,
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + localStorage.getItem("access"),
            "X-Company-ID": localStorage.getItem("company_id")
        },
        body: JSON.stringify(payload)
    });
    if(res.ok) location.reload();
}

async function deleteType(id) {
    if(!confirm("Өчүрүүгө макулсузбу?")) return;
    await fetch(window.API_BASE + `/api/v1/partner-types/${id}/`, {
        method: "DELETE",
        headers: { "Authorization": "Bearer " + localStorage.getItem("access"), "X-Company-ID": localStorage.getItem("company_id") }
    });
    loadTypes();
}

function editType(t) {
    document.getElementById("type_id").value = t.id;
    document.getElementById("t_code").value = t.code;
    document.getElementById("t_name").value = t.name;
    new bootstrap.Modal(document.getElementById('typeModal')).show();
}

function showTypeModal() {
    document.getElementById("type_id").value = "";
    new bootstrap.Modal(document.getElementById('typeModal')).show();
}

document.addEventListener("DOMContentLoaded", loadTypes);
</script>
{% endblock %}
