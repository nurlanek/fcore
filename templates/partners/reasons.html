{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="card shadow-sm p-4">
    <h4>{% trans "Transaction Reasons" %}</h4>
    <!-- Кошуу формасы -->
    <form id="reasonForm" class="row g-2 mb-4">
        <div class="col-md-3">
            <input type="text" id="r_name" class="form-control" placeholder="Аты (мис: Реклама)" required>
        </div>
        <div class="col-md-3">
            <input type="text" id="r_code" class="form-control" placeholder="Коду (мис: ads)" required>
        </div>
        <div class="col-md-3">
            <select id="r_type" class="form-select">
                <option value="expense">{% trans "Expense" %}</option>
                <option value="income">{% trans "Income" %}</option>
            </select>
        </div>
        <div class="col-md-3">
            <button type="submit" class="btn btn-success w-100">{% trans "Save" %}</button>
        </div>
    </form>

    <table class="table table-hover">
        <thead>
            <tr>
                <th>{% trans "Code" %}</th>
                <th>{% trans "Name" %}</th>
                <th>{% trans "Type" %}</th>
                <th>{% trans "Actions" %}</th>
            </tr>
        </thead>
        <tbody id="reasonRows"></tbody>
    </table>
</div>

<script>
// Тизмени жүктөө [4]
async function loadReasons() {
    const data = await apiFetch("/api/v1/reasons/");
    const tbody = document.getElementById("reasonRows");
    tbody.innerHTML = data.map(r => `
        <tr>
            <td><code>${r.code}</code></td>
            <td>${r.name}</td>
            <td><span class="badge ${r.type==='income'?'bg-success':'bg-danger'}">${r.type}</span></td>
            <td>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteReason(${r.id})">{% trans "Delete" %}</button>
            </td>
        </tr>
    `).join('');
}

// Жаңы кошуу [1]
document.getElementById("reasonForm").onsubmit = async function(e) {
    e.preventDefault();
    const payload = {
        name: document.getElementById("r_name").value,
        code: document.getElementById("r_code").value,
        type: document.getElementById("r_type").value
    };
    const res = await fetch(window.API_BASE + "/api/v1/reasons/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + localStorage.getItem("access"),
            "X-Company-ID": localStorage.getItem("company_id")
        },
        body: JSON.stringify(payload)
    });
    if(res.ok) { loadReasons(); this.reset(); }
};

async function deleteReason(id) {
    if(!confirm("Өчүрүүнү ырастайсызбы?")) return;
    await fetch(window.API_BASE + `/api/v1/reasons/${id}/`, {
        method: "DELETE",
        headers: { "Authorization": "Bearer " + localStorage.getItem("access"), "X-Company-ID": localStorage.getItem("company_id") }
    });
    loadReasons();
}

document.addEventListener("DOMContentLoaded", loadReasons);
</script>
{% endblock %}
