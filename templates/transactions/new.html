{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm p-4">
                <h4 class="mb-4">{% trans "New Transaction" %}</h4>

                <form id="txForm">
                    <div class="row">
                        <!-- Транзакциянын түрү -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">{% trans "Transaction type" %}</label>
                            <select class="form-select" id="tx_type" onchange="updateDropdowns()" required>
                                <option value="expense">{% trans "Expense" %}</option>
                                <option value="income">{% trans "Income" %}</option>
                            </select>
                        </div>

                        <!-- Күнү -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">{% trans "Date" %}</label>
                            <input class="form-control" id="date" type="date" required>
                        </div>
                    </div>

                    <div class="row">
                        <!-- Өнөктөш (Partner) -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">{% trans "Partner" %}</label>
                            <select class="form-select" id="partner">
                                <option value="">--- {% trans "Select Partner" %} ---</option>
                            </select>
                        </div>

                        <!-- Негиз (Reason) -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">{% trans "Reason" %}</label>
                            <select class="form-select" id="reason">
                                <option value="">--- {% trans "Select Reason" %} ---</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <!-- Эсеп (Account) -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">{% trans "Account" %}</label>
                            <select class="form-select" id="account" required></select>
                        </div>

                        <!-- Сумма -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">{% trans "Amount" %}</label>
                            <input class="form-control" id="amount" type="number" step="0.01" required>
                        </div>
                    </div>
                    <!-- Салык -->
                    <div class="col-md-12 mb-3">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="apply_tax">
                            <label class="form-check-label" for="apply_tax">{% trans "Calculate Taxes" %}</label>
                        </div>
                    </div>

                    <!-- Салыктын деталдары үчүн блок -->
                    <div id="taxPreviewBlock" class="alert alert-secondary d-none">
                        <small id="taxBreakdown"></small>
                        <div class="fw-bold mt-1">{% trans "Total with Tax" %}: <span id="totalWithTax">0</span></div>
                    </div>
                    <!-- Сүрөттөмө -->
                    <div class="mb-3">
                        <label class="form-label">{% trans "Description" %}</label>
                        <textarea class="form-control" id="description" rows="2"></textarea>
                    </div>
                    <div class="alert alert-info py-2 small mb-3">
                        <i class="bi bi-info-circle me-1"></i>
                       {% trans "The new transaction is saved as a" %}<strong>{% trans "Draft" %}</strong> {% trans "and will only appear in reports after approval." %}
                    </div>

                    <button type="submit" class="btn btn-sm btn-primary w-100">{% trans "Save Transaction" %}</button>
                </form>

                <div id="msg" class="mt-3 text-center"></div>
            </div>
        </div>
    </div>
</div>

<script>
// 1. Алгачкы жөндөөлөр
    document.getElementById('date').valueAsDate = new Date();
    let allAccounts = [];
    let allReasons = [];

    /* 2. Маалыматтарды жүктөө (Accounts, Partners, Reasons) [1] */
    async function loadInitialData() {
        try {
            const [accRes, partnerRes, reasonRes] = await Promise.all([
                apiFetch("/api/v1/accounts/balances/"),
                apiFetch("/api/v1/partners/"),
                apiFetch("/api/v1/reasons/")
            ]);
            allAccounts = accRes;
            allReasons = reasonRes;

            const pSel = document.getElementById("partner");
            partnerRes.forEach(p => {
                pSel.innerHTML += `<option value="${p.id}">${p.name}</option>`;
            });

            updateDropdowns();
        } catch (e) {
            console.error("Data load error:", e);
        }
    }

    /* 3. Түргө жараша эсептерди жана негиздерди чыпкалоо [2, 3] */
    function updateDropdowns() {
        const type = document.getElementById("tx_type").value;
        const accSel = document.getElementById("account");
        accSel.innerHTML = "";
        allAccounts.filter(a => a.type === type).forEach(a => {
            accSel.innerHTML += `<option value="${a.id}">${a.code} - ${a.name}</option>`;
        });

        const rSel = document.getElementById("reason");
        rSel.innerHTML = '<option value="">--- {% trans "Select Reason" %} ---</option>';
        allReasons.filter(r => r.type === type).forEach(r => {
            rSel.innerHTML += `<option value="${r.id}">${r.name}</option>`;
        });

        // Түр өзгөргөндө салыкты кайра эсептөө
        refreshTaxPreview();
    }

    /* 4. ЖАҢЫ: Салыкты алдын ала эсептөө функциясы [4] */
    async function refreshTaxPreview() {
        const amount = document.getElementById("amount").value;
        const isTaxEnabled = document.getElementById("apply_tax").checked;
        const previewBlock = document.getElementById("taxPreviewBlock");

        // Эгер чекбокс өчүк болсо же сумма жок болсо жашыруу
        if (!isTaxEnabled || !amount || amount <= 0) {
            previewBlock.classList.add("d-none");
            return;
        }

        const res = await apiFetch("/api/v1/taxes/preview/", {
            method: "POST",
            body: JSON.stringify({ subtotal: amount })
        });

        if (res) {
            previewBlock.classList.remove("d-none");
            document.getElementById("totalWithTax").innerText = res.total;
            document.getElementById("taxBreakdown").innerHTML = res.taxes.map(t =>
                `${t.name} (${t.rate}%): <b>${t.amount}</b>`
            ).join("<br>");
        }
    }

    // Сумма же чекбокс өзгөргөндө салыкты жаңыртуу
    document.getElementById("amount").addEventListener("input", refreshTaxPreview);
    document.getElementById("apply_tax").addEventListener("change", refreshTaxPreview);

    /* 5. Транзакцияны сактоо [5, 6] */
    document.getElementById("txForm").onsubmit = async function(e) {
        e.preventDefault();
        const msg = document.getElementById("msg");
        msg.innerHTML = "Saving...";

        const payload = {
            transaction_type: document.getElementById("tx_type").value,
            account_id: document.getElementById("account").value,
            partner_id: document.getElementById("partner").value || null,
            reason_id: document.getElementById("reason").value || null,
            amount: document.getElementById("amount").value,
            date: document.getElementById("date").value,
            description: document.getElementById("description").value,
            apply_tax: document.getElementById("apply_tax").checked // ЖАҢЫ: Чекбокс абалы
        };

        const res = await apiFetch("/api/v1/transactions/simple/", {
            method: "POST",
            body: JSON.stringify(payload)
        });

        if (res && res.entry_id) {
            msg.innerHTML = "<span class='text-success'>✅ {% trans 'Transaction saved successfully' %}</span>";
            // Форманы баштапкы абалга келтирүү
            document.getElementById("amount").value = "";
            document.getElementById("description").value = "";
            document.getElementById("apply_tax").checked = false;
            previewBlock.classList.add("d-none");
        } else {
            msg.innerHTML = "<span class='text-danger'>❌ Error: " + (res?.detail || "Save failed") + "</span>";
        }
    };

    document.addEventListener("DOMContentLoaded", loadInitialData);
    document.addEventListener("DOMContentLoaded", () => {
    loadCurrenciesGlobal("currency");
});
</script>
{% endblock %}
