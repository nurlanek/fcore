{% extends "base.html" %}
{% load i18n %}
{% block content %}

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">

      <h3 class="mb-3">{% trans "Company Settings" %}</h3>

      <form id="settingsForm">

          <label>{% trans "Company name" %}</label>
          <input class="form-control mb-2" id="name" required>

          <label>{% trans "Base currency" %}</label>
          <select class="form-select mb-3" id="currency"></select>

          <button class="btn btn-primary w-100">{% trans "Save" %}</button>

      </form>

      <div id="msg" class="mt-2"></div>

    </div>
  </div>
</div>

<script>
const API = "http://127.0.0.1:8001";

function headers(){
    return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + localStorage.getItem("access"),
        "X-Company-ID": localStorage.getItem("company_id")
    };
}

async function loadCurrencies(){
    const res = await fetch(API + "/api/v1/currencies/", {
        headers: headers()
    });
    const data = await res.json();

    const sel = document.getElementById("currency");
    sel.innerHTML = "";

    data.forEach(c=>{
        const opt = document.createElement("option");
        opt.value = c.id;
        opt.textContent = c.code + " - " + c.name;
        sel.appendChild(opt);
    });
}

async function loadCompany(){
    const res = await fetch(API + "/api/v1/companies/current/", {
        headers: headers()
    });
    const data = await res.json();

    document.getElementById("name").value = data.name;
    document.getElementById("currency").value = data.base_currency;
}

document.getElementById("settingsForm").onsubmit = async function(e){
    e.preventDefault();

    const payload = {
        name: document.getElementById("name").value,
        base_currency: document.getElementById("currency").value
    };

    const res = await fetch(API + "/api/v1/companies/current/", {
        method: "PUT",
        headers: headers(),
        body: JSON.stringify(payload)
    });

    const data = await res.json();

    if(res.ok){
        document.getElementById("msg").innerHTML =
            "<span class='text-success'>Saved ✔</span>";
    }else{
        document.getElementById("msg").innerHTML =
            "<span class='text-danger'>" + JSON.stringify(data) + "</span>";
    }
};

loadCurrencies().then(loadCompany);
</script>

{% endblock %}
