{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">

      <div class="card shadow-sm p-4">

        <h3 class="mb-3 text-center">{% trans "Create Company" %}</h3>

        <form id="companyForm">

            <label class="form-label">{% trans "Company name" %}</label>
            <input class="form-control mb-3" id="name" placeholder="Company name" required>

            <label class="form-label">{% trans "Base currency" %}</label>
            <select class="form-select mb-4" id="currency"></select>
            <!-- Тандалган валютанын астына кошуңуз -->
            <label>{% trans "Rate Provider (Bank)" %}</label>
            <select class="form-select mb-3" id="rate_provider">
                <option value="GLOBAL">Global (Default)</option>
                <option value="NBKR">Кыргызстан (NBKR)</option>
                <option value="TCMB">Түркия (TCMB)</option>
                <option value="CBU">Өзбекстан (CBU)</option>
            </select>


            <button class="btn btn-primary w-100">{% trans "Create" %}</button>

        </form>

        <div id="msg" class="mt-3 text-center"></div>

      </div>

    </div>
  </div>
</div>

<script>
// Баракча жүктөлгөндө валюталардын тизмесин алып келебиз
document.addEventListener("DOMContentLoaded", () => {
    loadCurrencies();
});

// Валюталарды серверден жүктөө функциясы
async function loadCurrencies(){
    const token = localStorage.getItem("access");
    // window.API_BASE колдонуу менен URL бир эле жерден башкарылат [1]
    const res = await fetch(window.API_BASE + "/api/v1/currencies/", {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    const data = await res.json();
    const sel = document.getElementById("currency");
    if(!sel) return;

    sel.innerHTML = "";
    data.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.id; // Backend күткөн валюта ID-си [2]
        opt.textContent = c.code + " - " + c.name;
        sel.appendChild(opt);
    });
}

// Форманы сактоо (Түзүү баскычы басылганда)
document.getElementById("companyForm").onsubmit = async function(e){
    e.preventDefault();

    const name = document.getElementById("name").value;
    const currency = document.getElementById("currency").value;
    const rate_provider = document.getElementById("rate_provider").value; // Тандалган банк
    const token = localStorage.getItem("access");

    // window.API_BASE колдонуу менен URL оңдолду [1]
    const res = await fetch(window.API_BASE + "/api/v1/companies/create/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
            name: name,
            base_currency: currency,
            rate_provider: rate_provider // Тандалган банкты серверге жиберебиз
        })
    });

    const data = await res.json();

    if(res.ok){
        // Компания түзүлгөндөн кийин анын ID-син сактап, панелге өтөбүз [2]
        localStorage.setItem("company_id", data.id);
        window.location.href = "/dashboard/";
    } else {
        document.getElementById("msg").innerHTML =
            "<span class='text-danger'>" + JSON.stringify(data) + "</span>";
    }
}
</script>


{% endblock %}
