{% extends "base.html" %}
{% load i18n %}
{% block content %}

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">

      <div class="card shadow-sm p-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
          <h4 class="mb-0">{% trans "My Companies" %}</h4>
          <a href="/company/create/" class="btn btn-sm btn-success">{% trans "+ New company"%}</a>
        </div>

        <table class="table table-sm">
          <thead>
            <tr>
              <th>{% trans "Name" %}</th>
              <th>{% trans "Role" %}</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>

      </div>

    </div>
  </div>
</div>

<script>
// 1. Компанияларды жүктөө функциясы
async function loadCompanies() {
  // base.html'деги apiFetch автоматтык түрдө токенди кошот [1]
  const data = await apiFetch("/api/v1/companies/");

  const tbody = document.getElementById("rows");
  if (!tbody) return;

  tbody.innerHTML = "";
  const activeId = localStorage.getItem("company_id"); // Учурдагы активдүү компания [3]

  data.forEach(c => {
    const tr = document.createElement("tr");
    // ID-лерди салыштыруу (UUID форматта) [3, 4]
    const isActive = activeId === c.company_id;

    tr.innerHTML = `
      <td>${c.company_name}</td>
      <td>${c.role}</td>
      <td>
        ${isActive
          ? "<span class='badge bg-primary'>Active</span>"
          : `<button class="btn btn-sm btn-outline-primary" onclick="switchCompany('${c.company_id}')">Switch</button>`
        }
      </td>
    `;
    tbody.appendChild(tr);
  });
}

// 2. Компанияны которуу функциясы
function switchCompany(id) {
  localStorage.setItem("company_id", id); // Жаңы ID-ни сактоо [3]
  window.location.href = "/dashboard/"; // Башкаруу панелине багыттоо [3]
}

// Барак жүктөлгөндө чакыруу
document.addEventListener("DOMContentLoaded", loadCompanies);
</script>

{% endblock %}
