{% extends "base.html" %}
{% load i18n %}
{% block content %}

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">

      <div class="card shadow-sm p-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
          <h4 class="mb-0">{% trans "My Companies" %}</h4>
          <a href="/company/create/" class="btn btn-sm btn-success">{% trans "+ New company"%}</a>
        </div>

        <table class="table table-sm">
          <thead>
            <tr>
              <th>{% trans "Name" %}</th>
              <th>{% trans "Role" %}</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>

      </div>

    </div>
  </div>
</div>

<script>
const API = "http://127.0.0.1:8001";

function headers(){
  return {
    "Authorization": "Bearer " + localStorage.getItem("access")
  };
}

async function loadCompanies(){
  const res = await fetch(API + "/api/v1/companies/", { headers: headers() });
  const data = await res.json();

  const tbody = document.getElementById("rows");
  tbody.innerHTML = "";

  const activeId = localStorage.getItem("company_id");

  data.forEach(c => {
    const tr = document.createElement("tr");

    const isActive = activeId === c.company_id;

    tr.innerHTML = `
      <td>${c.company_name}</td>
      <td>${c.role}</td>
      <td>
        ${isActive 
          ? "<span class='badge bg-primary'>Active</span>"
          : `<button class="btn btn-sm btn-outline-primary" onclick="switchCompany('${c.company_id}')">Switch</button>`
        }
      </td>
    `;

    tbody.appendChild(tr);
  });
}

function switchCompany(id){
  localStorage.setItem("company_id", id);
  window.location.href = "/dashboard/";
}

loadCompanies();
</script>

{% endblock %}
