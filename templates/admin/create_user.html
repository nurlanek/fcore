{% extends "base.html" %}
{% load i18n %}

{% block content %}

<h4>Create User</h4>

<form id="userForm" class="col-md-4">

  <input class="form-control mb-2" id="email" placeholder="Email" required>
  <input class="form-control mb-2" id="password" placeholder="Password" type="password" required>

  <select class="form-select mb-2" id="company"></select>

  <select class="form-select mb-2" id="role">
    <option value="admin">admin</option>
    <option value="accountant">accountant</option>
    <option value="manager">manager</option>
    <option value="viewer">viewer</option>
  </select>

  <button class="btn btn-primary">Create</button>
</form>

<div id="msg" class="mt-2"></div>

<script>
async function loadCompanies(){
  const companies = await apiFetch("/api/v1/companies/");
  const sel = document.getElementById("company");

  sel.innerHTML = companies.map(c =>
    `<option value="${c.company_id}">${c.company_name}</option>`
  ).join("");
}

document.getElementById("userForm").onsubmit = async function(e){
  e.preventDefault();

  const payload = {
    email: email.value,
    password: password.value,
    company_id: company.value,
    role: role.value
  };

  const res = await apiFetch("/api/v1/admin/users/create/", {
    method:"POST",
    body: JSON.stringify(payload)
  });

  const msg = document.getElementById("msg");

  if(res?.detail){
    msg.innerHTML = `<span class="text-success">${res.detail}</span>`;
    this.reset();
  }else{
    msg.innerHTML = `<span class="text-danger">${JSON.stringify(res)}</span>`;
  }
};

document.addEventListener("DOMContentLoaded", loadCompanies);
</script>

{% endblock %}
