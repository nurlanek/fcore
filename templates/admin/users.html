{% extends "base.html" %}
{% load i18n %}
{% block content %}

<div class="d-flex justify-content-between mb-3">
  <h4>Company Users</h4>
  <a href="/admin/users/create/" class="btn btn-primary">+ Create User</a>
</div>

<table class="table table-bordered">
<thead>
<tr>
  <th>Email</th>
  <th>Company</th>
  <th>Role</th>
  <th>Active</th>
  <th>Actions</th>
</tr>
</thead>

<tbody id="usersTable"></tbody>
</table>

<!-- Edit Modal -->
<div class="modal fade" id="editModal">
  <div class="modal-dialog">
    <div class="modal-content p-3">

      <h5>Edit User</h5>

      <input type="hidden" id="edit_user_id">

      <label>Email</label>
      <input class="form-control mb-2" id="edit_email" disabled>

      <label>Role</label>
      <select class="form-select mb-2" id="edit_role">
        <option value="admin">admin</option>
        <option value="accountant">accountant</option>
        <option value="manager">manager</option>
        <option value="viewer">viewer</option>
      </select>

      <label>
        <input type="checkbox" id="edit_active"> Active
      </label>

      <button class="btn btn-success mt-3" onclick="saveUser()">Save</button>

    </div>
  </div>
</div>

<script>
async function loadUsers(){
  const users = await apiFetch("/api/v1/admin/users/");
  const tbody = document.getElementById("usersTable");

  tbody.innerHTML = users.map(u => `
    <tr>
      <td>${u.email}</td>
      <td>${u.company_name}</td>
      <td>${u.role}</td>
      <td>${u.is_active ? "Yes" : "No"}</td>
      <td>
        <button class="btn btn-sm btn-warning" onclick="editUser('${u.id}')">Edit</button>
        <button class="btn btn-sm btn-danger" onclick="deleteUser('${u.id}')">Delete</button>
      </td>
    </tr>
  `).join("");
}

async function editUser(id){
  const data = await apiFetch(`/api/v1/admin/users/${id}/detail/`);

  edit_user_id.value = id;
  edit_email.value = data.email;
  edit_role.value = data.role;
  edit_active.checked = data.is_active;

  new bootstrap.Modal(document.getElementById("editModal")).show();
}

async function saveUser(){
  const id = edit_user_id.value;

  await apiFetch(`/api/v1/admin/users/${id}/edit/`, {
    method: "PUT",
    body: JSON.stringify({
      role: edit_role.value,
      is_active: edit_active.checked
    })
  });

  bootstrap.Modal.getInstance(document.getElementById("editModal")).hide();
  loadUsers();
}

async function deleteUser(id){
  if(!confirm("Delete user?")) return;

  await apiFetch(`/api/v1/admin/users/${id}/delete/`, {method:"DELETE"});
  loadUsers();
}

document.addEventListener("DOMContentLoaded", loadUsers);
</script>

{% endblock %}
